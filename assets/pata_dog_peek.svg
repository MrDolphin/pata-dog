<svg width="360" height="180" viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Pata Dog / peeking mascot asset inspired by the reference UI sticker -->
  <defs>
    <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#1f1f25" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Small motion marks under the peek edge -->
  <g fill="none" stroke="#333333" stroke-width="8" stroke-linecap="round" opacity="0.45">
    <path d="M 35 147 L 20 160"/>
    <path d="M 58 153 L 51 170"/>
    <path d="M 84 154 L 76 170"/>
  </g>

  <!-- Body/head silhouette: a low, wide dog peeking over an invisible UI edge -->
  <path
    d="
      M 42 144
      C 42 88, 72 51, 112 42
      L 133 10
      C 137 5, 145 6, 149 12
      L 166 40
      C 186 35, 211 35, 231 40
      L 248 12
      C 252 6, 260 5, 264 10
      L 285 43
      C 326 54, 340 95, 330 144
      Z"
    fill="#ffffff"
    stroke="#4a4043"
    stroke-width="10"
    stroke-linejoin="round"
    filter="url(#soft_shadow)"/>

  <!-- Warm inner ears -->
  <path d="M 132 26 L 146 45 L 121 45 Z" fill="#ffb6bd"/>
  <path d="M 264 26 L 243 46 L 272 47 Z" fill="#ffb6bd"/>

  <!-- Slight forehead shine to keep it soft on dark editor backgrounds -->
  <path
    d="M 86 83 C 118 55, 169 50, 213 54"
    fill="none"
    stroke="#ffffff"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.5"/>

  <!-- Face -->
  <circle cx="130" cy="96" r="7" fill="#3b3436"/>
  <circle cx="228" cy="100" r="7" fill="#3b3436"/>
  <path d="M 167 104 Q 177 116, 187 104" fill="none" stroke="#3b3436" stroke-width="7" stroke-linecap="round"/>
  <path d="M 187 104 Q 197 116, 207 104" fill="none" stroke="#3b3436" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="93" cy="113" rx="16" ry="9" fill="#ffb6bd" opacity="0.72"/>

  <!-- Little raised paw near the right cheek -->
  <g transform="translate(238 70) rotate(-17)">
    <path
      d="M 18 73 C 3 51, 8 17, 33 10 C 62 12, 75 42, 60 74 Z"
      fill="#ffffff"
      stroke="#4a4043"
      stroke-width="8"
      stroke-linejoin="round"/>
    <ellipse cx="40" cy="42" rx="12" ry="9" fill="#ff9f9f"/>
    <circle cx="25" cy="28" r="6" fill="#ff9f9f"/>
    <circle cx="41" cy="22" r="6" fill="#ff9f9f"/>
    <circle cx="56" cy="30" r="6" fill="#ff9f9f"/>
  </g>

  <!-- Bottom crop hint: the mascot is meant to sit just above a toolbar/status bar -->
  <path d="M 48 145 L 326 145" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
</svg>
