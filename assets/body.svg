<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Pata Dog / blob body -->
  <!-- Outline base to avoid weird overlaps, we merge ears and body using a single path -->
  <path d="
    M 50 240 
    C 30 150, 60 70, 100 50
    L 120 10 L 150 40
    C 180 30, 240 30, 270 40
    L 300 10 L 320 50
    C 360 80, 380 150, 360 240 
    Z" 
    fill="white" stroke="#333333" stroke-width="12" stroke-linejoin="round"/>
    
  <!-- Inner Ear Pink -->
  <path d="M 115 25 L 140 45 L 120 45 Z" fill="#ffb6c1"/>
  <path d="M 305 25 L 280 45 L 300 45 Z" fill="#ffb6c1"/>

  <!-- Eyes -->
  <circle cx="160" cy="120" r="10" fill="#333333"/>
  <circle cx="270" cy="130" r="10" fill="#333333"/>
  
  <!-- 'w' Mouth -->
  <path d="M 200 135 Q 210 155, 220 135" fill="none" stroke="#333333" stroke-width="8" stroke-linecap="round"/>
  <path d="M 220 135 Q 230 155, 240 135" fill="none" stroke="#333333" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Pink Blush -->
  <ellipse cx="120" cy="140" rx="20" ry="12" fill="#ffb6c1" opacity="0.8"/>
  <ellipse cx="310" cy="150" rx="20" ry="12" fill="#ffb6c1" opacity="0.8"/>
</svg>
