  <!-- Some abstract key blocks -->
  <rect x="160" y="78" width="20" height="15" fill="#f0f0f0" stroke="#333333" stroke-width="4"/>
  <rect x="185" y="78" width="20" height="15" fill="#f0f0f0" stroke="#333333" stroke-width="4"/>
  <rect x="210" y="78" width="80" height="15" fill="#f0f0f0" stroke="#333333" stroke-width="4"/>
