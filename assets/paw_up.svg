<svg width="150" height="150" xmlns="http://www.w3.org/2000/svg">
  <g transform="rotate(-20 75 75)">
    <!-- Arm/Paw raised -->
    <!-- The arm base is open to the bottom left -->
    <path d="M 20 160 C -10 100, 30 40, 75 30 C 120 40, 130 100, 100 160" fill="white" stroke="#333333" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pink beans (Meat pads) -->
    <!-- Main pad -->
    <ellipse cx="75" cy="65" rx="18" ry="12" fill="#ffb6c1"/>
    <!-- Toes -->
    <circle cx="50" cy="45" r="8" fill="#ffb6c1"/>
    <circle cx="75" cy="35" r="8" fill="#ffb6c1"/>
    <circle cx="100" cy="45" r="8" fill="#ffb6c1"/>
  </g>
</svg>
